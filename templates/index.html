<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App – InNovaIdeia</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
  /* ════════════════════════════════════════════════════════
     TOKENS & BACKGROUNDS
  ════════════════════════════════════════════════════════ */
  :root {
    --glass   : rgba(255,255,255,.12);
    --glass-hv: rgba(255,255,255,.20);
    --border  : rgba(255,255,255,.22);
    --shadow  : rgba(0,0,0,.25);
    --text    : #fff;
    --muted   : rgba(255,255,255,.70);
    --radius  : 20px;
    --card-r  : 16px;
    --trans   : .4s cubic-bezier(.4,0,.2,1);
  }

  /* Dynamic sky backgrounds */
  body { font-family:'Outfit',sans-serif; min-height:100dvh; transition:background var(--trans); }

  body.bg-default  { background:linear-gradient(145deg,#0f2c5a 0%,#1a4a8a 40%,#2563be 100%); }
  body.bg-clear    { background:linear-gradient(145deg,#f97316 0%,#fbbf24 30%,#38bdf8 70%,#0ea5e9 100%); }
  body.bg-cloudy   { background:linear-gradient(145deg,#374151 0%,#6b7280 50%,#9ca3af 100%); }
  body.bg-rain     { background:linear-gradient(145deg,#0c4a6e 0%,#0369a1 50%,#075985 100%); }
  body.bg-storm    { background:linear-gradient(145deg,#1c1917 0%,#292524 40%,#44403c 100%); }
  body.bg-snow     { background:linear-gradient(145deg,#bfdbfe 0%,#dbeafe 50%,#eff6ff 100%); color:#1e3a5f; }
  body.bg-mist     { background:linear-gradient(145deg,#4b5563 0%,#6b7280 40%,#9ca3af 100%); }

  /* Snow overrides muted text */
  body.bg-snow { --text:#1e3a5f; --muted:rgba(15,50,100,.65); --border:rgba(30,58,160,.2); --glass:rgba(200,220,255,.35); --glass-hv:rgba(200,220,255,.55); }

  /* ════════════════════════════════════════════════════════
     LAYOUT
  ════════════════════════════════════════════════════════ */
  .page-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
    color: var(--text);
  }

  /* ── HEADER ──────────────────────────────────────────── */
  .app-title {
    font-size: clamp(1.1rem,4vw,1.6rem);
    font-weight: 900;
    letter-spacing: -.02em;
    color: var(--text);
  }
  .brand-tag {
    font-size: .7rem;
    letter-spacing: .18em;
    opacity: .55;
    text-transform: uppercase;
  }

  /* ── SEARCH BAR ──────────────────────────────────────── */
  .search-wrap {
    position: relative;
    max-width: 540px;
    margin: 1.5rem auto 0;
  }
  .search-input {
    width: 100%;
    background: var(--glass);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: .85rem 3.5rem .85rem 1.5rem;
    color: var(--text);
    font-family: 'Outfit',sans-serif;
    font-size: 1rem;
    font-weight: 600;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    outline: none;
    transition: border-color var(--trans), background var(--trans);
  }
  .search-input::placeholder { color: var(--muted); font-weight:400; }
  .search-input:focus { border-color: rgba(255,255,255,.55); background: var(--glass-hv); }

  .search-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.25);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    backdrop-filter: blur(6px);
  }
  .search-btn:hover  { background: rgba(255,255,255,.40); }
  .search-btn:active { background: rgba(255,255,255,.15); }

  /* ── GLASS CARD ──────────────────────────────────────── */
  .g-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px var(--shadow);
    padding: 1.25rem 1.4rem;
    color: var(--text);
    transition: background var(--trans);
  }

  /* ── HERO CARD (city + temp) ─────────────────────────── */
  .hero-card {
    border-radius: var(--radius);
    padding: 2rem 1.8rem;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(255,255,255,.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .city-name {
    font-size: clamp(1.5rem,6vw,2.6rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -.03em;
  }
  .city-country {
    font-size: .85rem;
    opacity: .65;
    font-weight: 400;
    margin-top: .15rem;
  }
  .local-time {
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    opacity: .7;
    margin-top: .35rem;
  }
  .weather-emoji {
    font-size: clamp(3.5rem,12vw,6rem);
    line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,.3));
  }
  .temp-main {
    font-size: clamp(3rem,12vw,5.5rem);
    font-weight: 900;
    letter-spacing: -.04em;
    line-height: 1;
  }
  .temp-unit { font-size: .45em; font-weight: 300; vertical-align: super; }
  .feels-like { font-size: .9rem; opacity: .7; margin-top: .3rem; }
  .condition-label {
    font-size: clamp(.95rem,3vw,1.2rem);
    font-weight: 600;
    margin-top: .2rem;
  }
  .temp-range {
    font-size: .85rem;
    opacity: .65;
    margin-top: .2rem;
  }

  /* ── STAT CARD ───────────────────────────────────────── */
  .stat-label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    opacity: .55;
    margin-bottom: .25rem;
  }
  .stat-icon { font-size: 1.4rem; margin-bottom: .3rem; }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.1rem,4vw,1.5rem);
    font-weight: 500;
    line-height: 1;
  }
  .stat-unit { font-size: .7rem; opacity: .6; font-weight: 400; }

  /* ── SUN ROW ─────────────────────────────────────────── */
  .sun-row {
    display: flex; gap: 1rem; flex-wrap: wrap;
  }
  .sun-item {
    flex: 1; min-width: 110px;
    display: flex; align-items: center; gap: .6rem;
  }
  .sun-emoji { font-size: 1.6rem; }
  .sun-label { font-size: .7rem; opacity: .55; text-transform: uppercase; letter-spacing: .1em; }
  .sun-time  { font-family: 'DM Mono',monospace; font-size: 1.05rem; font-weight: 500; }

  /* ── COORDS ──────────────────────────────────────────── */
  .coords {
    font-family: 'DM Mono',monospace;
    font-size: .72rem;
    opacity: .45;
    margin-top: .5rem;
  }

  /* ── SPINNER / ERROR ─────────────────────────────────── */
  .spinner-ring {
    width: 44px; height: 44px;
    border: 4px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-card {
    background: rgba(239,68,68,.18);
    border: 1px solid rgba(239,68,68,.40);
    border-radius: var(--card-r);
    padding: 1rem 1.2rem;
    color: #fca5a5;
    font-weight: 600;
    display: flex; align-items: center; gap: .6rem;
  }

  /* ── HIDDEN ──────────────────────────────────────────── */
  .d-none { display: none !important; }

  /* ── FADE IN ─────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation: fadeUp .5s ease both; }
  .delay-1 { animation-delay: .08s; }
  .delay-2 { animation-delay: .16s; }
  .delay-3 { animation-delay: .24s; }

  /* ── WIND COMPASS ────────────────────────────────────── */
  .compass {
    display: inline-block;
    font-size: .95rem;
    transition: transform .4s;
  }

  /* ── MOBILE POLISH ───────────────────────────────────── */
  @media (max-width: 480px) {
    .hero-card { padding: 1.4rem 1.2rem; }
  }
  </style>
</head>
<body class="bg-default">
<div class="page-wrap">

  <!-- HEADER -->
  <div class="text-center mb-1">
    <div class="app-title">🌤 Weather App</div>
    <div class="brand-tag">InNovaIdeia &mdash; Dione Castro Alves</div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input id="cityInput" class="search-input" type="text"
           placeholder="Digite uma cidade… ex: São Paulo, BR"
           autocomplete="off" spellcheck="false"/>
    <button class="search-btn" id="searchBtn" title="Buscar">🔍</button>
  </div>

  <!-- FEEDBACK AREA -->
  <div id="feedback" class="mt-3 d-none"></div>

  <!-- LOADING -->
  <div id="loading" class="d-none">
    <div class="spinner-ring"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="d-none mt-3">

    <!-- HERO CARD -->
    <div class="g-card hero-card mb-3 fade-up">
      <div class="row align-items-center g-2">
        <div class="col-7 col-sm-8">
          <div class="city-name" id="rCity">—</div>
          <div class="city-country" id="rCountry"></div>
          <div class="local-time" id="rTime">—</div>
          <div class="mt-3">
            <div class="temp-main">
              <span id="rTemp">—</span><span class="temp-unit">°C</span>
            </div>
            <div class="feels-like">Sensação: <span id="rFeels">—</span>°C</div>
            <div class="condition-label" id="rCondition">—</div>
            <div class="temp-range">
              ↓ <span id="rMin">—</span>°  ↑ <span id="rMax">—</span>°
            </div>
          </div>
        </div>
        <div class="col-5 col-sm-4 text-center">
          <div class="weather-emoji" id="rEmoji">—</div>
          <div class="mt-2" style="font-size:.85rem;opacity:.7" id="rDesc">—</div>
        </div>
      </div>
      <div class="coords" id="rCoords"></div>
    </div>

    <!-- STAT CARDS ROW 1 -->
    <div class="row g-3 mb-3 fade-up delay-1">

      <div class="col-6 col-sm-3">
        <div class="g-card text-center h-100">
          <div class="stat-icon">💧</div>
          <div class="stat-label">Umidade</div>
          <div class="stat-value"><span id="rHumidity">—</span><span class="stat-unit"> %</span></div>
        </div>
      </div>

      <div class="col-6 col-sm-3">
        <div class="g-card text-center h-100">
          <div class="stat-icon">💨</div>
          <div class="stat-label">Vento</div>
          <div class="stat-value"><span id="rWind">—</span><span class="stat-unit"> m/s</span></div>
          <div class="compass mt-1" id="rWindDir">↑</div>
        </div>
      </div>

      <div class="col-6 col-sm-3">
        <div class="g-card text-center h-100">
          <div class="stat-icon">🧭</div>
          <div class="stat-label">Pressão</div>
          <div class="stat-value"><span id="rPressure">—</span><span class="stat-unit"> hPa</span></div>
        </div>
      </div>

      <div class="col-6 col-sm-3">
        <div class="g-card text-center h-100">
          <div class="stat-icon">👁️</div>
          <div class="stat-label">Visibilidade</div>
          <div class="stat-value"><span id="rVisibility">—</span><span class="stat-unit"> km</span></div>
        </div>
      </div>

    </div>

    <!-- STAT CARDS ROW 2 -->
    <div class="row g-3 mb-3 fade-up delay-2">

      <div class="col-6 col-sm-3">
        <div class="g-card text-center h-100">
          <div class="stat-icon">☁️</div>
          <div class="stat-label">Nuvens</div>
          <div class="stat-value"><span id="rClouds">—</span><span class="stat-unit"> %</span></div>
        </div>
      </div>

      <!-- SUN CARD -->
      <div class="col-12 col-sm-9">
        <div class="g-card h-100">
          <div class="stat-label mb-2">Ciclo Solar</div>
          <div class="sun-row">
            <div class="sun-item">
              <div class="sun-emoji">🌅</div>
              <div>
                <div class="sun-label">Nascer</div>
                <div class="sun-time" id="rSunrise">—</div>
              </div>
            </div>
            <div class="sun-item">
              <div class="sun-emoji">🌇</div>
              <div>
                <div class="sun-label">Pôr do sol</div>
                <div class="sun-time" id="rSunset">—</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- FULL ADDRESS -->
    <div class="fade-up delay-3 text-center" style="font-size:.75rem;opacity:.4" id="rAddress"></div>

  </div><!-- /results -->

</div><!-- /page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* =============================================================
   Weather App – Frontend JS
   InNovaIdeia | Dione Castro Alves
============================================================= */
(function () {
  "use strict";

  // ── ELEMENTS ───────────────────────────────────────────────
  const input    = document.getElementById("cityInput");
  const btn      = document.getElementById("searchBtn");
  const feedback = document.getElementById("feedback");
  const loading  = document.getElementById("loading");
  const results  = document.getElementById("results");

  // ── WIND DIRECTION ─────────────────────────────────────────
  const DIRS = ["N","NE","L","SE","S","SO","O","NO"];
  function degToDir(deg) {
    return DIRS[Math.round(deg / 45) % 8];
  }
  // Arrow rotation for compass emoji
  function degToArrow(deg) {
    const arrows = ["↑","↗","→","↘","↓","↙","←","↖"];
    return arrows[Math.round(deg / 45) % 8];
  }

  // ── FETCH WEATHER ──────────────────────────────────────────
  async function fetchWeather() {
    const city = input.value.trim();
    if (!city) {
      showError("Por favor, informe o nome de uma cidade.");
      return;
    }

    // Reset UI
    hideAll();
    loading.classList.remove("d-none");
    btn.disabled = true;

    try {
      const resp = await fetch("/weather", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ city }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        showError(data.error || "Erro desconhecido.");
        return;
      }

      renderWeather(data);

    } catch (err) {
      showError("Falha de conexão com o servidor.");
    } finally {
      loading.classList.add("d-none");
      btn.disabled = false;
    }
  }

  // ── RENDER ─────────────────────────────────────────────────
  function renderWeather(d) {
    // Background
    document.body.className = d.bg_class || "bg-default";

    // Hero
    setText("rCity",      d.city);
    setText("rCountry",   d.country ? `📍 ${d.full_address?.split(",").slice(-2).join(",").trim() || d.country}` : "");
    setText("rTime",      `🕐 ${d.local_time}`);
    setText("rTemp",      d.temp);
    setText("rFeels",     d.feels_like);
    setText("rCondition", d.condition);
    setText("rDesc",      d.description);
    setText("rMin",       d.temp_min);
    setText("rMax",       d.temp_max);
    setText("rEmoji",     d.icon_emoji);
    setText("rCoords",    `${d.lat}°N  ${d.lon}°E`);

    // Stats
    setText("rHumidity",   d.humidity);
    setText("rWind",       d.wind);
    setText("rPressure",   d.pressure);
    setText("rVisibility", d.visibility);
    setText("rClouds",     d.clouds);
    setText("rSunrise",    d.sunrise);
    setText("rSunset",     d.sunset);
    setText("rAddress",    d.full_address);

    // Wind direction
    const windDirEl = document.getElementById("rWindDir");
    windDirEl.textContent = `${degToArrow(d.wind_deg)} ${degToDir(d.wind_deg)}`;
    windDirEl.style.transform = `rotate(${d.wind_deg}deg)`;

    // Animate stat cards (re-trigger)
    results.querySelectorAll(".fade-up").forEach((el, i) => {
      el.style.animation = "none";
      // Force reflow
      void el.offsetWidth;
      el.style.animation = "";
    });

    results.classList.remove("d-none");
  }

  // ── HELPERS ────────────────────────────────────────────────
  function setText(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val ?? "—";
  }

  function hideAll() {
    feedback.classList.add("d-none");
    results.classList.add("d-none");
    feedback.innerHTML = "";
  }

  function showError(msg) {
    loading.classList.add("d-none");
    feedback.innerHTML = `
      <div class="error-card">
        <span>⚠️</span>
        <span>${msg}</span>
      </div>`;
    feedback.classList.remove("d-none");
  }

  // ── EVENTS ─────────────────────────────────────────────────
  btn.addEventListener("click", fetchWeather);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") fetchWeather();
  });

  // Auto-focus on load
  input.focus();

})();
</script>
</body>
</html>
